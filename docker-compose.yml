services:
  mailhog:
    container_name: mailhog.cami.larcity
    image: mailhog/mailhog
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    profiles:
      - batteries-included
      - all

  # Doc: https://ngrok.com/docs/using-ngrok-with/docker/#:~:text=Using%20ngrok%20with%20Docker%20Compose
  tunnel:
    container_name: ngrok.cami.larcity
    image: ngrok/ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTH_TOKEN}
      NGROK_CONFIG: /etc/ngrok.yml
    command:
      # CLI docs: https://ngrok.com/docs/agent/cli/#ngrok-start
      - "start"
      - "--all"
    volumes:
      # Be sure to run bin/thor lx-cli:tunnel:init to generate the ngrok.yml file
      - ./config/ngrok-via-docker.yml:/etc/ngrok.yml
    ports:
      - "4040:4040"
    profiles:
      - all

  app-store:
    container_name: db.cami.larcity
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${APP_DATABASE_NAME}
      POSTGRES_USER: ${APP_DATABASE_USER}
      POSTGRES_PASSWORD: ${APP_DATABASE_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust # IMPORTANT allows all connections without a password - experimental only!
    ports:
      - "16032:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      #- ./db/${RAILS_ENV:-development}/postgres/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
      #- ./db/${RAILS_ENV:-development}/postgres/downloads:/usr/local/downloads:ro
    profiles:
      - batteries-included
      - essential
      - all

  web:
    container_name: web.cami.larcity
    image: larcity/accounts-web
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - RAILS_ENV=${RAILS_ENV:-development}
      secrets:
        - source: gitcrypt-key
          target: gitcrypt.key
        - source: development-key
          target: development.key
        - source: production-key
          target: production.key
    restart: unless-stopped
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
      #RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      APP_CONFIG_CHECK_ENV_VARS: yes
      APP_DATABASE_HOST: db.cami.larcity
      APP_PRIMARY_DATABASE_NAME: ${APP_DATABASE_NAME}
      APP_DATABASE_USER: ${APP_DATABASE_USER}
      APP_DATABASE_PASSWORD: ${APP_DATABASE_PASSWORD}
      GITCRYPT_KEY_BASE64: ${GITCRYPT_KEY_BASE64}
      SMTP_USER: ${SMTP_USER}
    secrets:
      - source: gitcrypt-key
        target: gitcrypt.key
      - source: development-key
        target: development.key
    volumes:
      - ./config/credentials/git-crypt.key:/opt/project/src/.git/git-crypt/keys/default:ro
      - ./config/credentials/development.key:/opt/project/src/config/credentials/development.key:ro
      #- ./config/credentials/development.yml.enc:/opt/project/src/config/credentials.yml.enc:ro
      #- ./config/credentials/staging.key:/opt/project/src/config/credentials/staging.key:ro
      #- ./config/credentials/production.key:/opt/project/src/config/credentials/production.key:ro
    ports:
      - "16006:3000"
    depends_on:
      - app-store
    profiles:
      - batteries-included
      - essential
      - all

  worker:
    container_name: worker.cami.larcity
    image: larcity/accounts-worker
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        - RAILS_ENV=${RAILS_ENV:-development}
      secrets:
        - source: gitcrypt-key
          target: gitcrypt.key
        - source: development-key
          target: development.key
        - source: production-key
          target: production.key
    restart: unless-stopped
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
      #RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      APP_CONFIG_CHECK_ENV_VARS: yes
      APP_DATABASE_HOST: db.cami.larcity
      APP_PRIMARY_DATABASE_NAME: ${APP_DATABASE_NAME}
      APP_DATABASE_USER: ${APP_DATABASE_USER}
      APP_DATABASE_PASSWORD: ${APP_DATABASE_PASSWORD}
      GITCRYPT_KEY_BASE64: ${GITCRYPT_KEY_BASE64}
      SMTP_USER: ${SMTP_USER}
    secrets:
      - source: gitcrypt-key
        target: gitcrypt.key
      - source: development-key
        target: development.key
    volumes:
      - ./config/credentials/git-crypt.key:/opt/project/src/.git/git-crypt/keys/default:ro
      - ./config/credentials/development.key:/opt/project/src/config/credentials/development.key:ro
      #- ./config/credentials/development.yml.enc:/opt/project/src/config/credentials.yml.enc:ro
      #- ./config/credentials/staging.key:/opt/project/src/config/credentials/staging.key:ro
      #- ./config/credentials/production.key:/opt/project/src/config/credentials/production.key:ro
    depends_on:
      - app-store
    profiles:
      - batteries-included
      - essential
      - all

volumes:
  postgres_data:

secrets:
  gitcrypt-key:
    file: ./config/credentials/git-crypt.key
  development-key:
    file: ./config/credentials/development.key
  staging-key:
    file: ./config/credentials/staging.key
  production-key:
    file: ./config/credentials/production.key

networks:
  default:
    name: larcity_apps
    enable_ipv6: true
    driver: bridge
