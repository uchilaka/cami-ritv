# fly.toml app configuration file generated for cami-core
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
app = "cami-production"
primary_region = "iad"

[build]
dockerfile = "Dockerfile.web"

  [build.args]
  RAILS_ENV = "production"

[deploy]
release_command = "bundle exec rails db:migrate:primary data:migrate"

[env]
APP_CONFIG_CHECK_ENV_VARS = "yes"
#HOSTNAME = "cami-production.fly.dev"
HOSTNAME = "accounts.lar.city"
LOG_LEVEL = "info"
PORT = "16006"
RAILS_ENV = "production"
RAILS_LOG_TO_STDOUT = "true"
RAILS_SERVE_STATIC_FILES = "true"

[[mounts]]
destination = "/opt/project/src/storage"
source = "core_storage"

[processes]
web = "bin/rails server --binding 0.0.0.0 --port 16006"
worker = "bin/rails solid_queue:start"

[[services]]
internal_port = 16_006
processes = [ "web" ]
protocol = "tcp"

  [services.concurrency]
  hard_limit = 25
  soft_limit = 20
  type = "connections"

  [[services.ports]]
  force_https = true
  handlers = [ "http" ]
  port = 80

  [[services.ports]]
  handlers = [ "tls", "http" ]
  port = 443

  [[services.tcp_checks]]
  grace_period = "1s"
  interval = "15s"
  timeout = "2s"
